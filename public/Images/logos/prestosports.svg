<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="100%" height="100%">
  <!-- Icon: Interlocking P and S -->
  <g fill="none" stroke="#1E3A8A" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- P loop -->
    <path d="M 20 40 L 20 16 C 20 10, 34 10, 34 18 C 34 26, 20 26, 20 26" />
    <!-- S curve interlocking -->
    <path d="M 38 18 C 38 14, 48 14, 48 20 C 48 26, 38 28, 38 34 C 38 40, 48 40, 48 36" />
  </g>
  <!-- Text Wordmark -->
  <text x="65" y="38" font-family="system-ui, sans-serif" font-weight="800" font-size="20" fill="#1E3A8A" letter-spacing="0.5">PRESTO</text>
  <text x="148" y="38" font-family="system-ui, sans-serif" font-weight="400" font-size="20" fill="#6B7280" letter-spacing="0.5">SPORTS</text>
</svg>
